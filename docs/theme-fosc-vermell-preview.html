<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIGOR Theme Preview - Fosc Vermell</title>
  <style>
    /* AIGOR Theme: fosc vermell (equivalent) */
    :root {
      /* Base */
      --screen-bg: #0B1018;
      --title-color: #F3F4F6;
      --status-color: #7C879A;

      /* Input */
      --input-bg: #101623;
      --input-text: #F9FAFB;
      --input-hint: #7C879A;
      --input-border: #20283A;
      --input-border-focus: #FF5C5C;

      /* Botons */
      --send-bg: #FF5C5C;
      --send-text: #FFFFFF;

      /* Menú superior (⋮) */
      --menu-dots: #E5E7EB;
      --menu-bg: transparent;

      /* Bombolles */
      --bubble-user-bg: #2A1F24;
      --bubble-user-text: #F9FAFB;

      --bubble-bot-bg: #1A2130;
      --bubble-bot-text: #F9FAFB;

      /* Typing */
      --typing-dots: #D1D5DB;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--screen-bg);
      color: var(--title-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .phone {
      width: min(420px, 100%);
      height: 780px;
      background: var(--screen-bg);
      border: 1px solid #1f2937;
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 35px rgba(0,0,0,.45);
    }

    .topbar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: var(--title-color);
    }

    .menu {
      background: var(--menu-bg);
      border: none;
      color: var(--menu-dots);
      font-size: 30px;
      line-height: 1;
      cursor: pointer;
      padding: 2px 6px;
    }

    .chat {
      flex: 1;
      overflow: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row { display: flex; }
    .row.user { justify-content: flex-end; }
    .row.bot, .row.typing { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.35;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: var(--bubble-user-bg);
      color: var(--bubble-user-text);
    }

    .bot .bubble,
    .typing .bubble {
      background: var(--bubble-bot-bg);
      color: var(--bubble-bot-text);
    }

    .typing .bubble {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      min-width: 54px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--typing-dots);
      animation: blink 1.1s infinite ease-in-out;
      opacity: .4;
    }

    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }

    @keyframes blink {
      0%, 100% { transform: translateY(0) translateX(0) scale(.9); opacity: .35; }
      35% { transform: translateY(-5px) translateX(-1px) scale(1.05); opacity: 1; }
      65% { transform: translateY(2px) translateX(1px) scale(.95); opacity: .7; }
    }

    .status {
      color: var(--status-color);
      font-size: 12px;
      padding: 0 12px 6px;
    }

    .composer {
      display: flex;
      gap: 8px;
      padding: 8px;
    }

    .composer input {
      flex: 1;
      background: var(--input-bg);
      color: var(--input-text);
      border: 1px solid var(--input-border);
      border-radius: 18px;
      padding: 10px 12px;
      font-size: 15px;
      outline: none;
    }

    .composer input::placeholder {
      color: var(--input-hint);
    }

    .composer input:focus {
      border-color: var(--input-border-focus);
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--input-border-focus) 25%, transparent);
    }

    .send {
      border: none;
      border-radius: 12px;
      background: var(--send-bg);
      color: var(--send-text);
      font-weight: 700;
      padding: 0 14px;
      cursor: pointer;
    }

    .hint {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <div class="phone">
      <div class="topbar">
        <div class="title">AIGOR</div>
        <button class="menu" aria-label="Menú">⋮</button>
      </div>

      <div class="chat">
        <div class="row user"><div class="bubble">Aigor, bon dia!</div></div>
        <div class="row bot"><div class="bubble">Bon dia, Oriol ☀️
Que tinguis un dia espectacular.</div></div>
        <div class="row user"><div class="bubble">Dona'm estat del context</div></div>
        <div class="row typing">
          <div class="bubble">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
        </div>
      </div>

      <div class="status">Estat: llest</div>

      <div class="composer">
        <input placeholder="Escriu un missatge..." />
        <button class="send">Send</button>
      </div>
    </div>
    <div class="hint">Preview funcional del tema “fosc vermell”</div>
  </div>
</body>
</html>
